<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <!-- CSP: разрешаем только Supabase + jsdelivr (для @supabase/supabase-js) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; style-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'self'; form-action 'self'; frame-ancestors 'none'">
  <title>Админ-панель — Рабочий резерв</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e; 
      color: #eee;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { margin-bottom: 20px; color: #ffd700; }
    
    /* Login Screen */
    #login-screen { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh;
    }
    .login-box {
      background: #16213e;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .login-box h2 { margin-bottom: 20px; color: #ffd700; }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #0f3460;
      border-radius: 5px;
      background: #1a1a2e;
      color: #fff;
      font-size: 16px;
    }
    .btn {
      background: #ffd700;
      color: #1a1a2e;
      border: none;
      padding: 12px 30px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
      width: 100%;
      margin-top: 10px;
    }
    .btn:hover { background: #ffc400; }
    .btn-logout {
      background: #e94560;
      color: #fff;
      width: auto;
      padding: 8px 20px;
      margin-bottom: 20px;
    }
    .btn-logout:hover { background: #d63850; }
    
    .error { 
      color: #e94560; 
      margin-top: 10px; 
      font-size: 14px;
    }
    
    /* Dashboard */
    #dashboard { display: none; }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: #16213e;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    .stat-number {
      font-size: 36px;
      font-weight: bold;
      color: #ffd700;
    }
    .stat-label { color: #aaa; margin-top: 5px; font-size: 14px; }
    
    .table-wrapper {
      background: #16213e;
      border-radius: 10px;
      overflow-x: auto;
    }
    .admin-note-card {
      margin: 20px 0 24px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 16px;
    }
    .admin-note-card h2 {
      margin: 0 0 8px;
      color: #ffd700;
      font-size: 20px;
    }
    .admin-note-card p {
      margin: 0 0 12px;
      color: #aaa;
      font-size: 14px;
      line-height: 1.4;
    }
    .admin-note-card textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border-radius: 8px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #fff;
      padding: 12px;
      font-size: 14px;
      line-height: 1.45;
    }
    .admin-note-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
    }
    .btn-note-save {
      width: auto;
      margin-top: 0;
      padding: 10px 16px;
      font-size: 14px;
    }
    .note-status {
      margin-top: 8px;
      color: #00d9a3;
      font-size: 13px;
      min-height: 18px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }
    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #0f3460;
    }
    th { 
      background: #0f3460; 
      font-weight: 600;
      white-space: nowrap;
    }
    tr:hover { background: #1a1a3e; }
    
    /* Status badges */
    .status-badge {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
    }
    .status-new { background: #e94560; color: #fff; }
    .status-in_progress { background: #ffd700; color: #1a1a2e; }
    .status-done { background: #00d9a3; color: #1a1a2e; }
    
    /* Status select */
    .status-select {
      padding: 8px 12px;
      border-radius: 5px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    
    .loading { text-align: center; padding: 40px; color: #aaa; }
    .no-data { text-align: center; padding: 40px; color: #888; }
    
    @media (max-width: 768px) {
      .stats { grid-template-columns: 1fr 1fr; }
      body { padding: 10px; }
      .login-box { padding: 20px; }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-box">
      <h2>🔐 Вход в админку</h2>
      <input type="email" id="email" placeholder="Email" autocomplete="email">
      <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
      <p class="error" id="login-error" style="display:none">Неверный email или пароль</p>
      <button class="btn" onclick="login()">Войти</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="container">
    <button class="btn btn-logout" onclick="logout()">🚪 Выйти</button>
    <h1>📋 Заявки с сайта</h1>
    
    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="stat-total">0</div>
        <div class="stat-label">Всего заявок</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-new">0</div>
        <div class="stat-label">🆕 Новых</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-progress">0</div>
        <div class="stat-label">⚙️ В работе</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-done">0</div>
        <div class="stat-label">✅ Выполнено</div>
      </div>
    </div>

    <section class="admin-note-card" aria-labelledby="policy-log-title">
      <h2 id="policy-log-title">🔒 Внутренние изменения политики</h2>
      <p>Этот блок виден только в админке после авторизации. Используйте его как внутренний журнал изменений.</p>
      <textarea id="policy-notes" placeholder="Например: 28.04.2026 — убран публичный блок «Изменения политики», оставлена только редакция документа."></textarea>
      <div class="admin-note-actions">
        <button class="btn btn-note-save" type="button" onclick="savePolicyNotes()">Сохранить заметку</button>
      </div>
      <p class="note-status" id="policy-notes-status"></p>
    </section>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Телефон</th>
            <th>Задача</th>
            <th>Дата</th>
            <th>Статус</th>
          </tr>
        </thead>
        <tbody id="orders-table">
          <tr><td colspan="6" class="loading">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // ============================================
    // ⚠️ ВСТАВЬ СЮДА СВОИ КЛЮЧИ (те же, что в index.html)
    // ============================================
    const supabaseUrl = 'https://jlgqxbkxmrjyfaxdaarq.supabase.co/'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsZ3F4Ymt4bXJqeWZheGRhYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyOTE5MjgsImV4cCI6MjA5Mjg2NzkyOH0.Ae0VWzvDwjQ-IBFEGa3A45ih2sLB-inLoXRxNWfVd-8'
    // ============================================
    
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey)
    const POLICY_NOTES_KEY = 'admin-policy-notes-v1'
    const POLICY_NOTES_DB_TABLE = 'admin_settings'
    const POLICY_NOTES_DB_KEY = 'privacy_policy_changes'

    // Login function
    async function login() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const errorEl = document.getElementById('login-error')
      
      errorEl.style.display = 'none'
      
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      })
      
      if (error) {
        errorEl.textContent = 'Неверный email или пароль'
        errorEl.style.display = 'block'
      } else {
        document.getElementById('login-screen').style.display = 'none'
        document.getElementById('dashboard').style.display = 'block'
        loadPolicyNotes()
        loadOrders()
      }
    }

    // Logout function
    async function logout() {
      await supabaseClient.auth.signOut()
      document.getElementById('login-screen').style.display = 'flex'
      document.getElementById('dashboard').style.display = 'none'
      document.getElementById('email').value = ''
      document.getElementById('password').value = ''
    }

    function setPolicyNotesStatus(message, tone) {
      const status = document.getElementById('policy-notes-status')
      if (!status) return
      status.textContent = message || ''
      if (tone === 'error') status.style.color = '#e94560'
      else if (tone === 'warn') status.style.color = '#ffd700'
      else status.style.color = '#00d9a3'
    }

    async function loadPolicyNotes() {
      const textarea = document.getElementById('policy-notes')
      if (!textarea) return

      let localValue = ''
      try {
        localValue = localStorage.getItem(POLICY_NOTES_KEY) || ''
      } catch (error) {
        console.warn('localStorage недоступен для заметок политики', error)
      }

      textarea.value = localValue

      try {
        const { data, error } = await supabaseClient
          .from(POLICY_NOTES_DB_TABLE)
          .select('value')
          .eq('key', POLICY_NOTES_DB_KEY)
          .maybeSingle()

        if (error) throw error

        if (data && typeof data.value === 'string') {
          textarea.value = data.value
          try { localStorage.setItem(POLICY_NOTES_KEY, data.value) } catch (_) {}
          setPolicyNotesStatus('Загружено из Supabase', 'ok')
          setTimeout(() => setPolicyNotesStatus(''), 1500)
        }
      } catch (error) {
        console.warn('Не удалось загрузить заметки из Supabase, используем localStorage:', error.message)
        if (localValue) {
          setPolicyNotesStatus('Загружено локально (Supabase недоступен)', 'warn')
        }
      }
    }

    async function savePolicyNotes() {
      const textarea = document.getElementById('policy-notes')
      if (!textarea) return
      const value = textarea.value.trim()

      try {
        localStorage.setItem(POLICY_NOTES_KEY, value)
      } catch (error) {
        console.warn('Не удалось сохранить заметки в localStorage', error)
      }

      try {
        const { error } = await supabaseClient
          .from(POLICY_NOTES_DB_TABLE)
          .upsert({ key: POLICY_NOTES_DB_KEY, value }, { onConflict: 'key' })

        if (error) throw error

        setPolicyNotesStatus('Сохранено в Supabase', 'ok')
        setTimeout(() => setPolicyNotesStatus(''), 1800)
      } catch (error) {
        console.warn('Supabase-сохранение недоступно, оставлено локально:', error.message)
        setPolicyNotesStatus('Сохранено локально (Supabase недоступен)', 'warn')
      }
    }

    /* Безопасное создание ячейки таблицы — никакой склейки HTML из пользовательских данных. */
    function makeCell(text) {
      const td = document.createElement('td')
      td.textContent = text == null || text === '' ? '—' : String(text)
      return td
    }

    function makeStatusSelect(orderId, currentStatus) {
      const td = document.createElement('td')
      const select = document.createElement('select')
      select.className = 'status-select'
      select.addEventListener('change', () => updateStatus(orderId, select.value))
      const options = [
        ['new', '🆕 Новая'],
        ['in_progress', '⚙️ В работе'],
        ['done', '✅ Выполнена']
      ]
      for (const [value, label] of options) {
        const opt = document.createElement('option')
        opt.value = value
        opt.textContent = label
        if (currentStatus === value) opt.selected = true
        select.appendChild(opt)
      }
      td.appendChild(select)
      return td
    }

    function formatCreatedAt(value) {
      if (!value) return '—'
      const d = new Date(value)
      if (Number.isNaN(d.getTime())) return '—'
      return d.toLocaleString('ru-RU', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      })
    }

    // Load orders
    async function loadOrders() {
      const tbody = document.getElementById('orders-table')
      tbody.textContent = ''
      const loadingRow = document.createElement('tr')
      const loadingCell = document.createElement('td')
      loadingCell.colSpan = 6
      loadingCell.className = 'loading'
      loadingCell.textContent = 'Загрузка...'
      loadingRow.appendChild(loadingCell)
      tbody.appendChild(loadingRow)

      try {
        const { data, error } = await supabaseClient
          .from('orders')
          .select('*')
          .order('created_at', { ascending: false })

        if (error) throw error

        tbody.textContent = ''

        if (!data || data.length === 0) {
          const tr = document.createElement('tr')
          const td = document.createElement('td')
          td.colSpan = 6
          td.className = 'no-data'
          td.textContent = 'Пока нет заявок'
          tr.appendChild(td)
          tbody.appendChild(tr)
          updateStats([])
          return
        }

        for (const order of data) {
          const tr = document.createElement('tr')
          tr.appendChild(makeCell(order.id))
          tr.appendChild(makeCell(order.name))
          tr.appendChild(makeCell(order.phone))
          const service = typeof order.service === 'string' && order.service
            ? (order.service.length > 50 ? order.service.substring(0, 50) + '…' : order.service)
            : ''
          tr.appendChild(makeCell(service))
          tr.appendChild(makeCell(formatCreatedAt(order.created_at)))
          tr.appendChild(makeStatusSelect(order.id, order.status))
          tbody.appendChild(tr)
        }

        updateStats(data)
      } catch (error) {
        console.error('Ошибка:', error)
        tbody.textContent = ''
        const tr = document.createElement('tr')
        const td = document.createElement('td')
        td.colSpan = 6
        td.style.color = '#e94560'
        td.textContent = 'Ошибка загрузки. Проверьте консоль.'
        tr.appendChild(td)
        tbody.appendChild(tr)
      }
    }

    // Update stats
    function updateStats(orders) {
      document.getElementById('stat-total').textContent = orders.length
      document.getElementById('stat-new').textContent = orders.filter(o => o.status === 'new').length
      document.getElementById('stat-progress').textContent = orders.filter(o => o.status === 'in_progress').length
      document.getElementById('stat-done').textContent = orders.filter(o => o.status === 'done').length
    }

    // Update status
    async function updateStatus(id, newStatus) {
      try {
        const { error } = await supabaseClient
          .from('orders')
          .update({ status: newStatus })
          .eq('id', id)

        if (error) throw error
        
        // Reload to update stats
        loadOrders()
      } catch (error) {
        console.error('Ошибка:', error)
        alert('Не удалось обновить статус')
      }
    }

    // Enter key for login
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
        login()
      }
    })

    // Check if already logged in
    async function checkAuth() {
      const { data: { session } } = await supabaseClient.auth.getSession()
      if (session) {
        document.getElementById('login-screen').style.display = 'none'
        document.getElementById('dashboard').style.display = 'block'
        loadPolicyNotes()
        loadOrders()
      }
    }

    // Run on load
    checkAuth()
  </script>

</body>
</html>
